#
# Build pygrib Windows wheels with bundled ECCODES and upload to GitHub Release.
# Trigger: release published or manual workflow_dispatch.

name: Build pygrib Windows wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-eccodes:
    name: Build ECCODES
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ECCODES
        run: |
          $env:LOCALAPPDATA = $env:RUNNER_TEMP
          .\scripts\build-eccodes-windows.ps1 -InstallPrefix "$env:RUNNER_TEMP\eccodes" -BuildDir "$env:RUNNER_TEMP\eccodes-build"

      - name: Upload ECCODES
        uses: actions/upload-artifact@v4
        with:
          name: eccodes-windows
          path: ${{ runner.temp }}/eccodes

  build-wheels:
    name: Build pygrib wheels
    needs: build-eccodes
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download ECCODES
        uses: actions/download-artifact@v4
        with:
          name: eccodes-windows
          path: eccodes

      - name: Build pygrib wheel
        env:
          ECCODES_DIR: ${{ github.workspace }}/eccodes
        run: |
          python -m pip wheel pygrib --no-deps -w dist
          $whl = Get-ChildItem dist\pygrib-*-win_amd64.whl | Select-Object -First 1
          if (-not $whl) { throw "No wheel built" }
          python scripts/patch-pygrib-wheel.py $whl.FullName $env:ECCODES_DIR

      - name: Smoke test
        run: |
          python -m pip install (Get-ChildItem dist\pygrib-*-win_amd64.whl | Select-Object -First 1).FullName
          python -c "import pygrib; print(f'pygrib {pygrib.__version__} OK')"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pygrib-wheels-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    name: Upload to Release
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: pygrib-wheels-*
          path: wheels
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: wheels/**/*.whl
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
