# Windows-specific overrides
# Docker Compose merges this automatically with docker-compose.yml
#
# The .cdsapirc is at %USERPROFILE%\.cdsapirc on Windows
# Docker Desktop translates Windows paths automatically.

services:
  export-rgba:
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ${USERPROFILE}/.cdsapirc:/root/.cdsapirc:ro

  export-volume:
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ${USERPROFILE}/.cdsapirc:/root/.cdsapirc:ro

  shell:
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ../scripts:/app/scripts
      - ${USERPROFILE}/.cdsapirc:/root/.cdsapirc:ro
