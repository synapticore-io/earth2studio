# Earth2Studio CAMS Export Pipeline
#
# Usage:
#   # RGBA mode (default: 3 days ending yesterday)
#   docker compose up export-rgba
#
#   # Custom date range:
#   EXPORT_DAYS=7 EXPORT_START=2026-03-01 docker compose up export-rgba
#
#   # 3D Volume mode (5 Species × 8 Levels)
#   docker compose up export-volume
#
#   # Interaktive Shell (debugging, custom runs)
#   docker compose run --rm shell
#
# Output: ./outputs/exr_sequence/
# Cache:  ./.cache/earth2studio/  (bleibt erhalten zwischen Runs)

services:
  # ── RGBA Export: R=Dust G=PM2.5 B=SO₂ A=Dust@5km ──
  export-rgba:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ${HOME}/.cdsapirc:/root/.cdsapirc:ro
    environment:
      - EARTH2STUDIO_CACHE=/data/cache
      - E2S_OUTPUT_DIR=/data/outputs/exr_sequence
    command: >
      scripts/export_exr_sequence.py
      --days ${EXPORT_DAYS:-3}

  # ── 3D Volume Export: All species × all heights ──
  export-volume:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ${HOME}/.cdsapirc:/root/.cdsapirc:ro
    environment:
      - EARTH2STUDIO_CACHE=/data/cache
      - E2S_OUTPUT_DIR=/data/outputs/exr_sequence
    command: >
      scripts/export_exr_sequence.py
      --days ${EXPORT_DAYS:-3}
      --volume-3d

  # ── Interactive Shell ──
  shell:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../outputs:/data/outputs
      - ../.cache:/data/cache
      - ../scripts:/app/scripts
      - ${HOME}/.cdsapirc:/root/.cdsapirc:ro
    environment:
      - EARTH2STUDIO_CACHE=/data/cache
      - E2S_OUTPUT_DIR=/data/outputs/exr_sequence
    entrypoint: ["bash"]
    stdin_open: true
    tty: true
